name: Build & Release

# Publishes a GitHub Release whenever you push a version tag like v1.1.0.
# The eCheque MICO360 in-app updater consumes exactly this output:
#   - a .zip asset containing the app at its root
#   - a .sha256 companion asset (and a SHA256: line in the notes) for verification
#   - the tag as the version number
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if (-not $v) { $v = "${{ github.ref_name }}".TrimStart('v') }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "Resolved version: $v"

      - name: Restore
        run: dotnet restore eCheque.MICO360.csproj

      - name: Publish (self-contained win-x64)
        shell: pwsh
        run: |
          dotnet publish eCheque.MICO360.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -p:PublishSingleFile=false `
            -o publish

      - name: Build Windows installer (Inno Setup)
        id: installer
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" "installer\eCheque.MICO360.iss"
          $setup = "installer_output\eCheque-MICO360-Setup-${{ steps.ver.outputs.version }}.exe"
          $hash = (Get-FileHash $setup -Algorithm SHA256).Hash.ToLower()
          "$hash  $(Split-Path $setup -Leaf)" | Out-File "$setup.sha256" -Encoding ascii
          echo "setup=$setup" >> $env:GITHUB_OUTPUT
          echo "sha256=$hash" >> $env:GITHUB_OUTPUT
          echo "Installer: $setup ($hash)"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: eCheque MICO360 ${{ steps.ver.outputs.version }}
          body: |
            ## eCheque MICO360 ${{ steps.ver.outputs.version }}

            Automated release build.

            **Windows installer (complete, all modules included):** `eCheque-MICO360-Setup-${{ steps.ver.outputs.version }}.exe`
            Installs machine-wide into Program Files (admin required). The in-app updater downloads and runs this installer.

            SHA256: ${{ steps.installer.outputs.sha256 }}

            <!-- Add [mandatory] anywhere in these notes to force the update. -->
          files: |
            ${{ steps.installer.outputs.setup }}
            ${{ steps.installer.outputs.setup }}.sha256
            ${{ steps.pack.outputs.asset }}
            ${{ steps.pack.outputs.asset }}.sha256
