name: Build & Release

# Publishes a GitHub Release whenever you push a version tag like v1.1.0.
# The eCheque MICO360 in-app updater consumes exactly this output:
#   - a .zip asset containing the app at its root
#   - a .sha256 companion asset (and a SHA256: line in the notes) for verification
#   - the tag as the version number
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if (-not $v) { $v = "${{ github.ref_name }}".TrimStart('v') }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "Resolved version: $v"

      - name: Restore
        run: dotnet restore eCheque.MICO360.csproj

      - name: Publish (self-contained win-x64)
        shell: pwsh
        run: |
          dotnet publish eCheque.MICO360.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -p:PublishSingleFile=false `
            -o publish

      - name: Package zip + checksum
        id: pack
        shell: pwsh
        run: |
          $name = "eCheque-MICO360-${{ steps.ver.outputs.version }}-win-x64.zip"
          Compress-Archive -Path publish/* -DestinationPath $name -Force
          $hash = (Get-FileHash $name -Algorithm SHA256).Hash.ToLower()
          "$hash  $name" | Out-File "$name.sha256" -Encoding ascii
          echo "asset=$name" >> $env:GITHUB_OUTPUT
          echo "sha256=$hash" >> $env:GITHUB_OUTPUT
          echo "Package: $name"
          echo "SHA256: $hash"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: eCheque MICO360 ${{ steps.ver.outputs.version }}
          body: |
            ## eCheque MICO360 ${{ steps.ver.outputs.version }}

            Automated release build.

            SHA256: ${{ steps.pack.outputs.sha256 }}

            <!-- Add [mandatory] anywhere in these notes to force the update. -->
          files: |
            ${{ steps.pack.outputs.asset }}
            ${{ steps.pack.outputs.asset }}.sha256
